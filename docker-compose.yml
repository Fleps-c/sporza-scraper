services:
  scraper:
    build: .
    volumes:
      - ./data:/app/data
    # Run on-demand: docker compose run --rm scraper pl-scrape --limit 50
    profiles: ["cli"]

  dashboard:
    build: .
    entrypoint: ["streamlit", "run", "sporza_scraper/dashboard.py", "--server.address=0.0.0.0"]
    ports:
      - "8501:8501"
    volumes:
      - ./data:/app/data
    restart: unless-stopped
